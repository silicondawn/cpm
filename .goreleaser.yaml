version: 2

builds:
  - binary: cpm
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/jakubkontra/cpm/internal.Version={{.Version}}
      - -X github.com/jakubkontra/cpm/internal.Commit={{.ShortCommit}}

archives:
  - format: binary
    name_template: "cpm_{{ .Os }}_{{ .Arch }}{{ if eq .Os \"windows\" }}.exe{{ end }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

brews:
  - repository:
      owner: jakubkontra
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: cpm
    homepage: "https://github.com/jakubkontra/claude-profile-manager"
    description: "Claude Profile Manager — manage multiple Claude Code accounts"
    license: "MIT"
    install: |
      bin.install "cpm"
    test: |
      system "#{bin}/cpm", "version"

scoops:
  - repository:
      owner: silicondawn
      name: scoop-cpm
      token: "{{ .Env.SCOOP_TAP_TOKEN }}"
    homepage: "https://github.com/silicondawn/cpm"
    description: "Claude Profile Manager — manage multiple Claude Code accounts"
    license: MIT
