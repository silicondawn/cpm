version: 2

builds:
  - binary: cpm
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
    ldflags:
      - -s -w
      - -X github.com/jakubkontra/cpm/internal.Version={{.Version}}
      - -X github.com/jakubkontra/cpm/internal.Commit={{.ShortCommit}}

archives:
  - format: tar.gz
    name_template: "cpm_{{ .Os }}_{{ .Arch }}"
    # Windows: zip (scoop publisher requires it, and Windows users expect zip).
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

# Conventional Commits — group commits by type in release notes.
# Matches: feat:, fix:, perf:, refactor:, ci:, build: (with optional scope).
# Excludes: docs:, test:, chore:, and merge commits.
changelog:
  use: github
  sort: asc
  abbrev: 0
  groups:
    - title: "✨ Features"
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: "🐛 Bug fixes"
      regexp: '^.*?(fix|perf)(\(.+\))??!?:.+$'
      order: 1
    - title: "♻️ Refactor"
      regexp: '^.*?refactor(\(.+\))??!?:.+$'
      order: 2
    - title: "🚀 CI / Build / Release"
      regexp: '^.*?(ci|build|release)(\(.+\))??!?:.+$'
      order: 3
    - title: "📝 Other changes"
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^Merge pull request'
      - '^Merge branch'

scoops:
  - repository:
      owner: silicondawn
      name: cpm
      # token omitted → goreleaser uses the default GITHUB_TOKEN, which
      # already has contents:write on this same repo (no PAT needed).
    directory: bucket
    homepage: "https://github.com/silicondawn/cpm"
    description: "Claude Profile Manager — manage multiple Claude Code accounts"
    license: MIT
