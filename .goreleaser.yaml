version: 2

builds:
  - binary: cpm
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/jakubkontra/cpm/internal.Version={{.Version}}
      - -X github.com/jakubkontra/cpm/internal.Commit={{.ShortCommit}}

archives:
  - format: binary
    name_template: "cpm_{{ .Os }}_{{ .Arch }}{{ if eq .Os \"windows\" }}.exe{{ end }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

# brews and scoops publishers intentionally omitted from this fork's release.
# The upstream brew tap (jakubkontra/homebrew-tap) is not writeable from this
# fork, and the scoop bucket (silicondawn/scoop-cpm) has not been created yet.
# Distribution is via GitHub Releases binary download only.
# To re-enable, restore the brews/scoops blocks and provision the tap repos
# plus HOMEBREW_TAP_TOKEN / SCOOP_TAP_TOKEN secrets.
