version: 2

builds:
  - binary: cpm
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/jakubkontra/cpm/internal.Version={{.Version}}
      - -X github.com/jakubkontra/cpm/internal.Commit={{.ShortCommit}}

archives:
  - format: binary
    # goreleaser auto-appends .exe on windows for format: binary, so we
    # do NOT add it ourselves (would produce cpm_windows_amd64.exe.exe)
    name_template: "cpm_{{ .Os }}_{{ .Arch }}"
    # Windows needs a zip archive (scoop publisher requires it).
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

# Conventional Commits — group commits by type in release notes.
# Matches: feat:, fix:, perf:, refactor:, ci:, build: (with optional scope).
# Excludes: docs:, test:, chore:, and merge commits.
changelog:
  use: github
  sort: asc
  abbrev: 0
  groups:
    - title: "✨ Features"
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: "🐛 Bug fixes"
      regexp: '^.*?(fix|perf)(\(.+\))??!?:.+$'
      order: 1
    - title: "♻️ Refactor"
      regexp: '^.*?refactor(\(.+\))??!?:.+$'
      order: 2
    - title: "🚀 CI / Build / Release"
      regexp: '^.*?(ci|build|release)(\(.+\))??!?:.+$'
      order: 3
    - title: "📝 Other changes"
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^Merge pull request'
      - '^Merge branch'

scoops:
  - repository:
      owner: silicondawn
      name: scoop-cpm
      token: "{{ .Env.SCOOP_TAP_TOKEN }}"
    homepage: "https://github.com/silicondawn/cpm"
    description: "Claude Profile Manager — manage multiple Claude Code accounts"
    license: MIT
